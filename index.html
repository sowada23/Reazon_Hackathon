<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ネオンスネーク・ナンバーズ</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #0f172a; /* ダークネイビー */
            font-family: 'Consolas', 'Arial', sans-serif;
            overflow: hidden;
        }
        #header {
            display: flex;
            justify-content: space-between;
            width: 450px;
            margin-bottom: 15px;
        }
        #scoreBoard {
            font-size: 24px;
            font-weight: bold;
            color: #38bdf8; /* ネオンブルー */
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
        #speedBoard {
            font-size: 18px;
            font-weight: bold;
            color: #a855f7; /* ネオンパープル */
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
            align-self: flex-end;
        }
        canvas {
            background-color: #1e293b; /* ディープグレー */
            border-radius: 8px;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.2);
            border: 2px solid #334155;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .hidden { display: none !important; }
        .title { 
            font-size: 40px; 
            font-weight: bold; 
            color: #38bdf8; 
            margin-bottom: 20px; 
            text-align: center; 
            white-space: pre-line;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.7);
        }
        .btn {
            padding: 12px 35px; font-size: 20px; font-weight: bold;
            color: #0f172a; background-color: #38bdf8; border: none; border-radius: 25px;
            cursor: pointer; transition: 0.2s;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }
        .btn:hover { 
            background-color: #7dd3fc; 
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.8);
            transform: scale(1.05);
        }
        #hint { font-size: 14px; color: #64748b; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="header">
        <div id="scoreBoard">現在の数字: 2</div>
        <div id="speedBoard">速度: Lv.1</div>
    </div>
    
    <canvas id="gameCanvas" width="450" height="450"></canvas>

    <div id="overlay">
        <div class="title" id="overlayTitle">NEON SNAKE<br>NUMBERS</div>
        <button class="btn" id="startBtn">ゲームスタート</button>
        <div id="hint">※スペースキーでもスタートできます</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreBoard = document.getElementById('scoreBoard');
        const speedBoard = document.getElementById('speedBoard');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const startBtn = document.getElementById('startBtn');

        // --- Web Audio API ---
        let audioCtx;
        let bgmInterval;
        
        const bgmNotes = [261.63, 329.63, 392.00, 493.88, 440.00, 349.23, 392.00, 523.25];
        let bgmIndex = 0;

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'eat') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'crash') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.15);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);

                playGameOverMelody();
            }
        }

        function playGameOverMelody() {
            const now = audioCtx.currentTime;
            const sadNotes = [311.13, 293.66, 277.18, 246.94];
            
            sadNotes.forEach((note, index) => {
                const sOsc = audioCtx.createOscillator();
                const sGain = audioCtx.createGain();
                sOsc.type = 'triangle';
                sOsc.frequency.setValueAtTime(note, now + index * 0.15);
                sGain.gain.setValueAtTime(0.15, now + index * 0.15);
                sGain.gain.linearRampToValueAtTime(0.001, now + index * 0.15 + 0.2);
                sOsc.connect(sGain);
                sGain.connect(audioCtx.destination);
                sOsc.start(now + index * 0.15);
                sOsc.stop(now + index * 0.15 + 0.2);
            });
        }

        function startBGM() {
            stopBGM();
            bgmIndex = 0;
            bgmInterval = setInterval(() => {
                if (!audioCtx || isGameOver) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'triangle'; 
                osc.frequency.setValueAtTime(bgmNotes[bgmIndex], audioCtx.currentTime);
                
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.16);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.16);
                
                bgmIndex = (bgmIndex + 1) % bgmNotes.length;
            }, 200); 
        }

        function stopBGM() {
            if (bgmInterval) clearInterval(bgmInterval);
        }

        // --- ゲームの基本設定 ---
        let gridSize = 15;
        let tileSize = canvas.width / gridSize;
        let baseMoveInterval = 220;
        let moveInterval = baseMoveInterval;
        
        let player, dx, dy, nextDx, nextDy, lastTime, isGameOver, items, popScale;
        let isFirstScreen = true; 

        // サイバーネオン調のカラーパレットに変更
        const colors = {
            2: { bg: '#1e3a8a', text: '#60a5fa' },    // ブルー
            4: { bg: '#2563eb', text: '#93c5fd' },    // ライトブルー
            8: { bg: '#581c87', text: '#c084fc' },    // パープル
            16: { bg: '#701a75', text: '#f472b6' },   // ピンク
            32: { bg: '#9d174d', text: '#fb7185' },   // ローズ
            64: { bg: '#991b1b', text: '#f87171' },   // レッド
            128: { bg: '#7c2d12', text: '#fb923c' },  // オレンジ
            256: { bg: '#78350f', text: '#fbbf24' },  // イエロー
            512: { bg: '#064e3b', text: '#34d399' },  // ミントグリーン
            1024: { bg: '#0f766e', text: '#2dd4bf' }, // ティール
            2048: { bg: '#111827', text: '#22d3ee' }  // サイバーシアン（最高位）
        };

        function initGame() {
            gridSize = 15;
            tileSize = canvas.width / gridSize;
            player = { x: 7, y: 7, visualX: 7, visualY: 7, value: 2, size: 1 };
            dx = 1; dy = 0; nextDx = 1; nextDy = 0;
            isGameOver = false;
            isFirstScreen = false;
            popScale = 1.0;
            updateDifficulty();
            spawnItems();
            
            overlay.classList.add('hidden');
            
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            startBGM();
            
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function updateDifficulty() {
            const level = Math.log2(player.value); 
            moveInterval = Math.max(80, baseMoveInterval - (level - 1) * 10);
            
            if (player.value >= 1024) {
                if (gridSize !== 20) {
                    gridSize = 20;
                    tileSize = canvas.width / gridSize;
                }
                player.size = 2;
                scoreBoard.innerHTML = `現在の数字: ${player.value} <span style="color:#2dd4bf; font-size:16px;">(MATRIX EXPANSION)</span>`;
            } else {
                if (gridSize !== 15) {
                    gridSize = 15;
                    tileSize = canvas.width / gridSize;
                }
                player.size = 1;
                scoreBoard.innerText = `現在の数字: ${player.value}`;
            }
            
            speedBoard.innerText = `速度: Lv.${level}`;
        }

        function getPlayerCells(pX, pY, pSize) {
            let cells = [];
            for (let x = 0; x < pSize; x++) {
                for (let y = 0; y < pSize; y++) {
                    cells.push({ x: pX + x, y: pY + y });
                }
            }
            return cells;
        }

        function spawnItems() {
            items = [];
            let emptyCells = [];
            const currentPCells = getPlayerCells(player.x, player.y, player.size);

            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const isOccupied = currentPCells.some(cell => cell.x === c && cell.y === r);
                    if (!isOccupied) emptyCells.push({ x: c, y: r });
                }
            }

            function getRandomCell() {
                const index = Math.floor(Math.random() * emptyCells.length);
                return emptyCells.splice(index, 1)[0];
            }

            for (let i = 0; i < 3; i++) {
                if (emptyCells.length > 0) {
                    const targetCell = getRandomCell();
                    items.push({ x: targetCell.x, y: targetCell.y, value: player.value, type: 'target' });
                }
            }

            const level = Math.log2(player.value);
            const obstacleCount = Math.min(10, 2 + level);
            const possibleValues = [2, 4, 8, 16, 32, 64, 128, 256].filter(v => v !== player.value);
            
            for (let i = 0; i < obstacleCount; i++) {
                if (emptyCells.length > 0) {
                    const obsCell = getRandomCell();
                    const randomValue = possibleValues[Math.floor(Math.random() * possibleValues.length)];
                    items.push({ x: obsCell.x, y: obsCell.y, value: randomValue, type: 'obstacle' });
                }
            }
        }

        function update() {
            if (isGameOver) return;

            dx = nextDx; dy = nextDy;
            player.x += dx; player.y += dy;

            const pCells = getPlayerCells(player.x, player.y, player.size);

            const hitWall = pCells.some(cell => cell.x < 0 || cell.x >= gridSize || cell.y < 0 || cell.y >= gridSize);
            if (hitWall) {
                gameOver(); return;
            }

            let hitIndex = -1;
            for (let cell of pCells) {
                hitIndex = items.findIndex(item => item.x === cell.x && item.y === cell.y);
                if (hitIndex !== -1) break;
            }

            if (hitIndex !== -1) {
                const hitItem = items[hitIndex];
                if (hitItem.type === 'target') {
                    player.value *= 2;
                    popScale = 1.4; 
                    playSound('eat');
                    updateDifficulty(); 
                    spawnItems();       
                } else {
                    gameOver();
                }
            }
        }

        function gameOver() {
            isGameOver = true;
            stopBGM();
            playSound('crash'); 
            overlay.classList.remove('hidden');
            overlayTitle.innerHTML = `<span style="color:#ef4444; text-shadow: 0 0 15px rgba(239,68,68,0.7);">GAME OVER</span>\n(SCORE: ${player.value})`;
            startBtn.innerText = "スペースキーでリトライ";
            startBtn.style.backgroundColor = "#ef4444";
            startBtn.style.boxShadow = "0 0 15px rgba(239, 68, 68, 0.4)";
        }

        function drawPlayerBlock(x, y, value, size, scale = 1.0) {
            const colorObj = colors[value] || { bg: '#0f172a', text: '#ffffff' };
            const totalWidth = size * tileSize;
            const cx = x * tileSize + totalWidth / 2;
            const cy = y * tileSize + totalWidth / 2;
            
            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(scale, scale);
            ctx.translate(-cx, -cy);

            // プレイヤー（スネークの頭）にネオンの光彩エフェクトを追加
            ctx.shadowBlur = 15;
            ctx.shadowColor = colorObj.text;
            ctx.fillStyle = colorObj.bg;
            ctx.fillRect(x * tileSize + 2, y * tileSize + 2, totalWidth - 4, totalWidth - 4);
            
            // 枠線を追加してデジタル感を演出
            ctx.strokeStyle = colorObj.text;
            ctx.lineWidth = 2;
            ctx.strokeRect(x * tileSize + 2, y * tileSize + 2, totalWidth - 4, totalWidth - 4);

            ctx.shadowBlur = 0; // テキストは影を消してくっきりさせる
            ctx.fillStyle = colorObj.text;
            const fSize = gridSize === 20 ? (value > 100 ? '16px' : '22px') : (value > 100 ? '20px' : '28px');
            ctx.font = 'bold ' + fSize + ' Courier New';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(value, cx, cy);
            
            ctx.restore();
        }

        function drawNormalBlock(x, y, value) {
            const colorObj = colors[value] || { bg: '#0f172a', text: '#ffffff' };
            const cx = x * tileSize + tileSize / 2;
            const cy = y * tileSize + tileSize / 2;
            
            ctx.fillStyle = colorObj.bg;
            ctx.fillRect(x * tileSize + 2, y * tileSize + 2, tileSize - 4, tileSize - 4);
            
            ctx.strokeStyle = colorObj.text;
            ctx.lineWidth = 1;
            ctx.strokeRect(x * tileSize + 2, y * tileSize + 2, tileSize - 4, tileSize - 4);

            ctx.fillStyle = colorObj.text;
            const fSize = gridSize === 20 ? (value > 100 ? '12px' : '15px') : (value > 100 ? '16px' : '20px');
            ctx.font = 'bold ' + fSize + ' Courier New';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(value, cx, cy);
        }

        function draw() {
            // キャンバス背景色をディープグレーに変更
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // グリッド線をサイバーチックな薄い青に変更
            ctx.strokeStyle = 'rgba(56, 189, 248, 0.08)';
            for (let i = 0; i < gridSize; i++) {
                ctx.beginPath(); ctx.moveTo(i * tileSize, 0); ctx.lineTo(i * tileSize, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i * tileSize); ctx.lineTo(canvas.width, i * tileSize); ctx.stroke();
            }

            items.forEach(item => drawNormalBlock(item.x, item.y, item.value));

            player.visualX += (player.x - player.visualX) * 0.35;
            player.visualY += (player.y - player.visualY) * 0.35;

            if (popScale > 1.0) popScale = Math.max(1.0, popScale - 0.08);
            
            drawPlayerBlock(player.visualX, player.visualY, player.value, player.size, popScale);
        }

        function gameLoop(timestamp) {
            if (isGameOver) return;
            if (timestamp - lastTime >= moveInterval) {
                update();
                lastTime = timestamp;
            }
            draw();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('keydown', (e) => {
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].indexOf(e.code) > -1) {
                e.preventDefault();
            }

            if (e.key === ' ' || e.code === 'Space') {
                if (isFirstScreen || isGameOver) {
                    initGame();
                    return;
                }
            }

            switch (e.key) {
                case 'ArrowUp':    if (dy !== 1)  { nextDx = 0; nextDy = -1; dx = 0; dy = -1; } break;
                case 'ArrowDown':  if (dy !== -1) { nextDx = 0; nextDy = 1;  dx = 0; dy = 1;  } break;
                case 'ArrowLeft':  if (dx !== 1)  { nextDx = -1; nextDy = 0; dx = -1; dy = 0; } break;
                case 'ArrowRight': if (dx !== -1) { nextDx = 1; nextDy = 0;  dx = 1; dy = 0;  } break;
            }
        });

        startBtn.addEventListener('click', initGame);
    </script>
</body>
</html>
